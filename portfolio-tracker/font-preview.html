<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Font Preview — André Gutto Logo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,opsz,wght@0,6..96,300;0,6..96,400;1,6..96,300&family=GFS+Didot&family=Playfair+Display:wght@400;500&family=Italiana&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #f5f4f1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px;
      font-family: -apple-system, sans-serif;
    }
    h1 {
      font-size: 11px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 40px;
    }
    .grid {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
      max-width: 1080px;
    }
    .card {
      background: #fff;
      border: 1px solid #e0deda;
      border-radius: 10px;
      padding: 28px 28px 24px;
      width: 188px;
      display: flex;
      flex-direction: column;
    }
    .label {
      font-size: 10px;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #b0aca6;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .logo-text {
      color: #1B2F4E;
      line-height: 1.1;
      margin-bottom: 20px;
    }
    hr {
      border: none;
      border-top: 1px solid #ebebeb;
      margin-bottom: 16px;
    }
    .page-title {
      color: #555;
      line-height: 1.2;
    }
  </style>
</head>
<body>
  <h1>Novas opções — estilo premium / alto contraste</h1>
  <div class="grid">

    <!-- 6. Bodoni Moda 300 -->
    <div class="card">
      <div class="label">6 · Bodoni Moda<br>weight 300</div>
      <div class="logo-text" style="font-family:'Bodoni Moda',serif;font-size:32px;font-weight:300;font-optical-sizing:auto;">André Gutto</div>
      <hr />
      <div class="page-title" style="font-family:'Bodoni Moda',serif;font-size:20px;font-weight:300;font-optical-sizing:auto;">Portfólio</div>
    </div>

    <!-- 7. Bodoni Moda itálico 300 -->
    <div class="card">
      <div class="label">7 · Bodoni Moda<br>itálico 300</div>
      <div class="logo-text" style="font-family:'Bodoni Moda',serif;font-size:32px;font-weight:300;font-style:italic;font-optical-sizing:auto;">André Gutto</div>
      <hr />
      <div class="page-title" style="font-family:'Bodoni Moda',serif;font-size:20px;font-weight:300;font-style:italic;font-optical-sizing:auto;">Portfólio</div>
    </div>

    <!-- 8. GFS Didot 400 -->
    <div class="card">
      <div class="label">8 · GFS Didot<br>weight 400</div>
      <div class="logo-text" style="font-family:'GFS Didot',serif;font-size:32px;font-weight:400;">André Gutto</div>
      <hr />
      <div class="page-title" style="font-family:'GFS Didot',serif;font-size:20px;font-weight:400;">Portfólio</div>
    </div>

    <!-- 9. Playfair Display 400 -->
    <div class="card">
      <div class="label">9 · Playfair Display<br>weight 400</div>
      <div class="logo-text" style="font-family:'Playfair Display',serif;font-size:32px;font-weight:400;">André Gutto</div>
      <hr />
      <div class="page-title" style="font-family:'Playfair Display',serif;font-size:20px;font-weight:400;">Portfólio</div>
    </div>

    <!-- 10. Italiana 400 -->
    <div class="card">
      <div class="label">10 · Italiana<br>weight 400</div>
      <div class="logo-text" style="font-family:'Italiana',serif;font-size:32px;font-weight:400;">André Gutto</div>
      <hr />
      <div class="page-title" style="font-family:'Italiana',serif;font-size:20px;font-weight:400;">Portfólio</div>
    </div>

  </div>
</body>
</html>
