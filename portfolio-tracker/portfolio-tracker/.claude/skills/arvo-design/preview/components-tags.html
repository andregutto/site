<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Tags & pills</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .card { padding: 22px 28px; min-height: 100vh; justify-content: center; gap: 14px; }
  .row { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .lab { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.30em; text-transform: uppercase; color: var(--arvo-fg-soft); }
  .tag { font-family: var(--arvo-font-display); font-size: 10px; letter-spacing: 0.10em; padding: 5px 12px; border-radius: 999px; display: inline-flex; align-items: center; gap: 6px; }
  .dot { width: 6px; height: 6px; border-radius: 999px; }
  .blue { background: rgba(27,79,216,0.10); color: #1B4FD8; }
  .red { background: rgba(214,59,47,0.10); color: #D63B2F; }
  .ocre { background: rgba(232,160,32,0.14); color: #946400; }
  .gold-out { background: transparent; color: var(--arvo-gold); border: 1px solid var(--arvo-gold); }
  .pos { color: #1e6f3a; background: rgba(30,111,58,0.08); }
  .neg { color: #B83020; background: rgba(184,48,32,0.08); }
</style></head>
<body>
<div class="card">
  <div class="lab">data tags · vertical accent</div>
  <div class="row">
    <span class="tag blue">▲ +12.4%</span>
    <span class="tag red">● Lisboa</span>
    <span class="tag ocre"><span class="dot" style="background:#E8A020;"></span>Live em 20min</span>
    <span class="tag gold-out">cultivo</span>
  </div>
  <div class="lab">status — sentiment</div>
  <div class="row">
    <span class="tag pos">▲ +R$ 2.840</span>
    <span class="tag neg">▼ −R$ 410</span>
    <span class="tag" style="background: rgba(13,13,13,0.06); color: var(--arvo-fg-muted);">arquivado</span>
  </div>
</div>
</body></html>
