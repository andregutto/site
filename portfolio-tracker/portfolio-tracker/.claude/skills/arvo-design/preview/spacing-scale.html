<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Spacing scale</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .card { padding: 22px 28px; min-height: 100vh; justify-content: center; gap: 11px; }
  .row { display: grid; grid-template-columns: 60px 1fr 80px; align-items: center; gap: 14px; }
  .nm { font-family: var(--arvo-font-display); font-size: 11px; color: var(--arvo-fg); letter-spacing: 0.05em; }
  .bar { height: 14px; background: var(--arvo-gold); border-radius: 3px; }
  .px { font-family: var(--arvo-font-display); font-size: 10px; letter-spacing: 0.08em; color: var(--arvo-fg-soft); }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="nm">space-1</div><div class="bar" style="width:4px;"></div><div class="px">4px</div></div>
  <div class="row"><div class="nm">space-2</div><div class="bar" style="width:8px;"></div><div class="px">8px</div></div>
  <div class="row"><div class="nm">space-3</div><div class="bar" style="width:12px;"></div><div class="px">12px</div></div>
  <div class="row"><div class="nm">space-4</div><div class="bar" style="width:16px;"></div><div class="px">16px</div></div>
  <div class="row"><div class="nm">space-5</div><div class="bar" style="width:24px;"></div><div class="px">24px</div></div>
  <div class="row"><div class="nm">space-6</div><div class="bar" style="width:32px;"></div><div class="px">32px</div></div>
  <div class="row"><div class="nm">space-7</div><div class="bar" style="width:48px;"></div><div class="px">48px</div></div>
  <div class="row"><div class="nm">space-8</div><div class="bar" style="width:64px;"></div><div class="px">64px</div></div>
  <div class="row"><div class="nm">space-9</div><div class="bar" style="width:96px;"></div><div class="px">96px</div></div>
</div>
</body></html>
