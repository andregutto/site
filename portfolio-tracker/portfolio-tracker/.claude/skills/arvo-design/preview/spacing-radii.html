<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Radii</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; padding: 18px; min-height: 100vh; align-items: center; }
  .cell { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .box { width: 70px; height: 70px; background: var(--arvo-gold); }
  .nm { font-family: var(--arvo-font-display); font-size: 11px; color: var(--arvo-fg); }
  .px { font-family: var(--arvo-font-display); font-size: 10px; letter-spacing: 0.08em; color: var(--arvo-fg-soft); }
  .pill { width: 80px; height: 32px; background: var(--arvo-gold); border-radius: 999px; }
</style></head>
<body>
<div class="grid">
  <div class="cell"><div class="box" style="border-radius:3px;"></div><div class="nm">xs</div><div class="px">3 · inputs</div></div>
  <div class="cell"><div class="box" style="border-radius:6px;"></div><div class="nm">sm</div><div class="px">6</div></div>
  <div class="cell"><div class="box" style="border-radius:10px;"></div><div class="nm">md</div><div class="px">10 · swatches</div></div>
  <div class="cell"><div class="box" style="border-radius:14px;"></div><div class="nm">lg</div><div class="px">14 · cards</div></div>
  <div class="cell"><div class="pill"></div><div class="nm">pill</div><div class="px">999 · tags</div></div>
</div>
</body></html>
