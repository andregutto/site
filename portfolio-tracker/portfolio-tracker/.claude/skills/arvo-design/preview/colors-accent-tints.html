<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Accent tints</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .grid { padding: 16px; min-height: 100vh; display: grid; gap: 10px; align-content: center; }
  .row { display: grid; grid-template-columns: 90px repeat(4, 1fr); gap: 6px; align-items: stretch; }
  .lab { font-family: var(--arvo-font-display); font-size: 11px; letter-spacing: 0.06em; color: var(--arvo-fg); align-self: center; }
  .ch { height: 44px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.1em; }
</style></head>
<body>
<div class="grid">
  <div class="row">
    <div class="lab">Azul · cap</div>
    <div class="ch" style="background: rgba(27,79,216,0.08); color: #1B4FD8;">.08</div>
    <div class="ch" style="background: rgba(27,79,216,0.16); color: #1B4FD8;">.16</div>
    <div class="ch" style="background: rgba(27,79,216,0.32); color: #fff;">.32</div>
    <div class="ch" style="background: #1B4FD8; color: #fff;">solid</div>
  </div>
  <div class="row">
    <div class="lab">Vermelho</div>
    <div class="ch" style="background: rgba(214,59,47,0.08); color: #D63B2F;">.08</div>
    <div class="ch" style="background: rgba(214,59,47,0.16); color: #D63B2F;">.16</div>
    <div class="ch" style="background: rgba(214,59,47,0.32); color: #fff;">.32</div>
    <div class="ch" style="background: #D63B2F; color: #fff;">solid</div>
  </div>
  <div class="row">
    <div class="lab">Ocre</div>
    <div class="ch" style="background: rgba(232,160,32,0.10); color: #B87D00;">.10</div>
    <div class="ch" style="background: rgba(232,160,32,0.18); color: #B87D00;">.18</div>
    <div class="ch" style="background: rgba(232,160,32,0.34); color: #6B4900;">.34</div>
    <div class="ch" style="background: #E8A020; color: #4d2f00;">solid</div>
  </div>
  <div class="row">
    <div class="lab">Verde</div>
    <div class="ch" style="background: rgba(31,138,91,0.10); color: #1F8A5B;">.10</div>
    <div class="ch" style="background: rgba(31,138,91,0.18); color: #1F8A5B;">.18</div>
    <div class="ch" style="background: rgba(31,138,91,0.34); color: #0F4A30;">.34</div>
    <div class="ch" style="background: #1F8A5B; color: #fff;">solid</div>
  </div>
  <div class="row">
    <div class="lab">Dourado</div>
    <div class="ch" style="background: rgba(200,184,154,0.12); color: #8A7956;">.12</div>
    <div class="ch" style="background: rgba(200,184,154,0.25); color: #8A7956;">.25</div>
    <div class="ch" style="background: rgba(200,184,154,0.5); color: #4a3a1f;">.50</div>
    <div class="ch" style="background: #C8B89A; color: #4a3a1f;">solid</div>
  </div>
</div>
</body></html>
