<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Display — Tenor Sans</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .card { padding: 22px 28px; min-height: 100vh; justify-content: center; gap: 14px; }
  .row { display: grid; grid-template-columns: 1fr 100px; align-items: baseline; gap: 16px; }
  .spec { font-family: var(--arvo-font-display); color: var(--arvo-fg); }
  .meta { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--arvo-fg-soft); text-align: right; }
  .h1 { font-size: 48px; letter-spacing: 0.08em; line-height: 1.05; }
  .h2 { font-size: 28px; letter-spacing: 0.05em; }
  .h3 { font-size: 18px; letter-spacing: 0.04em; }
  .body { font-size: 14px; letter-spacing: 0.02em; line-height: 1.7; color: var(--arvo-fg-muted); }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="spec h1">cultive</div><div class="meta">H1 · 48 · .08em</div></div>
  <div class="row"><div class="spec h2">o que é seu</div><div class="meta">H2 · 28 · .05em</div></div>
  <div class="row"><div class="spec h3">patrimônio cultivado</div><div class="meta">H3 · 18 · .04em</div></div>
  <div class="row"><div class="spec body">Conta a história antes de dar conselho. A linguagem é do dia-a-dia, não de palestrante.</div><div class="meta">body · 14 · .02em</div></div>
</div>
</body></html>
