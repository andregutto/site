<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Symbol — App Icons</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-black); overflow: hidden; }
  .card { color: var(--arvo-fg-on-dark); }
  .row { gap: 24px; align-items: flex-end; }
  .ic { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { border-radius: 22%; background: var(--arvo-black); border: 1px solid var(--arvo-border-dark); display: flex; align-items: center; justify-content: center; }
  .box.gold { background: var(--arvo-gold); border-color: transparent; }
  .box.light { background: var(--arvo-offwhite); border-color: transparent; }
  .lab { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--arvo-fg-on-dark-soft); }
</style></head>
<body class="dark">
<div class="card center">
  <div class="row" style="justify-content: center;">
    <div class="ic">
      <div class="box" style="width: 96px; height: 96px;">
        <img src="../assets/logo/arvo-symbol-gold.svg" width="52" height="54" alt="">
      </div>
      <span class="lab">96 · principal</span>
    </div>
    <div class="ic">
      <div class="box light" style="width: 72px; height: 72px;">
        <img src="../assets/logo/arvo-symbol-black.svg" width="36" height="38" alt="">
      </div>
      <span class="lab">72 · light</span>
    </div>
    <div class="ic">
      <div class="box gold" style="width: 64px; height: 64px;">
        <img src="../assets/logo/arvo-symbol-black.svg" width="30" height="32" alt="">
      </div>
      <span class="lab">64 · gold</span>
    </div>
    <div class="ic">
      <div class="box" style="width: 48px; height: 48px;">
        <img src="../assets/logo/arvo-symbol-gold.svg" width="24" height="25" alt="">
      </div>
      <span class="lab">48</span>
    </div>
    <div class="ic">
      <div class="box" style="width: 32px; height: 32px;">
        <img src="../assets/logo/arvo-symbol-gold.svg" width="16" height="17" alt="">
      </div>
      <span class="lab">32</span>
    </div>
  </div>
</div>
</body></html>
