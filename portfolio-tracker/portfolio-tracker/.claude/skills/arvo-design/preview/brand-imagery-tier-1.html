<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Imagery — Tier 1</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-black); overflow: hidden; }
  .card { padding: 12px; gap: 8px; min-height: 100vh; }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr; gap: 8px; flex: 1; }
  figure { position: relative; border-radius: 8px; overflow: hidden; }
  img { width: 100%; height: 100%; object-fit: cover; display: block; filter: var(--arvo-photo-filter); }
  figcaption { position: absolute; left: 10px; bottom: 8px; right: 10px; color: var(--arvo-fg-on-dark); }
  .use { font-family: var(--arvo-font-display); font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(200,184,154,0.75); }
  .desc { font-family: var(--arvo-font-serif); font-style: italic; font-size: 11px; opacity: 0.85; margin-top: 2px; line-height: 1.3; }
  figure::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(13,13,13,0.85), transparent 55%); }
  figcaption { z-index: 2; }
</style></head>
<body class="dark">
<div class="card">
  <div class="grid">
    <figure>
      <img src="../assets/imagery/01-broto-floresta.jpg" alt="">
      <figcaption><div class="use">Tier 1 · Hero</div><div class="desc">o pequeno que cresce</div></figcaption>
    </figure>
    <figure>
      <img src="../assets/imagery/02-arvore-solitaria.jpg" alt="">
      <figcaption><div class="use">Tier 1 · Institutional</div><div class="desc">permanência</div></figcaption>
    </figure>
    <figure>
      <img src="../assets/imagery/03-capins-dourados.jpg" alt="">
      <figcaption><div class="use">Tier 1 · Texture</div><div class="desc">calor maduro</div></figcaption>
    </figure>
    <figure>
      <img src="../assets/imagery/04-vista-trem.jpg" alt="">
      <figcaption><div class="use">Tier 1 · Voyage</div><div class="desc">a jornada</div></figcaption>
    </figure>
  </div>
</div>
</body></html>
