<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Icon library</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .wrap { padding: 16px 22px; min-height: 100vh; display: flex; flex-direction: column; gap: 14px; }

  .meta { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.30em; text-transform: uppercase; color: var(--arvo-fg-soft); display: flex; align-items: center; gap: 14px; }
  .meta::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(13,13,13,0.18), transparent); }

  .group { display: flex; flex-direction: column; gap: 8px; }
  .groupLabel { font-family: var(--arvo-font-display); font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--arvo-fg-soft); }

  .icons {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    gap: 2px;
    border: 1px solid var(--arvo-border-soft);
    border-radius: 8px;
    padding: 8px;
    background: white;
  }
  .ic {
    aspect-ratio: 1;
    display: flex; align-items: center; justify-content: center;
    color: var(--arvo-fg);
    border-radius: 4px;
    transition: background 200ms;
    cursor: default;
    position: relative;
  }
  .ic:hover { background: rgba(200,184,154,0.18); color: #8A7956; }
  .ic svg { display: block; }
  .ic[data-name]:hover::after {
    content: attr(data-name);
    position: absolute;
    bottom: calc(100% + 4px);
    font-family: var(--arvo-font-display);
    font-size: 9px;
    letter-spacing: 0.10em;
    color: var(--arvo-fg);
    background: rgba(13,13,13,0.92);
    color: var(--arvo-offwhite);
    padding: 3px 7px;
    border-radius: 4px;
    white-space: nowrap;
    z-index: 5;
  }

  .glyphRow { display: flex; gap: 24px; font-family: var(--arvo-font-display); font-size: 22px; color: var(--arvo-fg); padding: 4px 8px; }
  .glyphRow span { line-height: 1; }
  .glyphMeta { font-family: var(--arvo-font-serif); font-style: italic; font-size: 11px; color: var(--arvo-fg-muted); margin-top: 2px; }
</style></head>
<body>
<div class="wrap">

  <div class="meta">Icon library · 1.5px stroke · 16-grid</div>

  <div class="group">
    <div class="groupLabel">Navegação</div>
    <div class="icons" id="g-nav"></div>
  </div>

  <div class="group">
    <div class="groupLabel">Finanças & dados</div>

  </div>

  <div class="group">
    <div class="groupLabel">Ações & ferramentas</div>

  </div>

  <div class="group">
    <div class="groupLabel">UI & estado</div>
    <div class="icons" id="g-ui"></div>
  </div>

  <div class="group">
    <div class="groupLabel">Glyph alphabet · só para labels</div>
    <div class="glyphRow">

  </div>

function makeIcon(name) {
  const wrap = document.createElement('div');
  wrap.className = 'ic';
  wrap.setAttribute('data-name', name);
  wrap.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]}</svg>`;
  return wrap;
}

    if (!ICONS[n]) continue;
    el.appendChild(makeIcon(n));
