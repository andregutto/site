<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Buttons — dark</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-black); overflow: hidden; }
  .card { padding: 22px 28px; min-height: 100vh; justify-content: center; gap: 16px; }
  .row { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .lab { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.30em; text-transform: uppercase; color: rgba(200,184,154,0.55); }
  .sizes { display: flex; gap: 18px; align-items: flex-end; flex-wrap: wrap; padding: 8px 0; }
  .sizeGrp { display: flex; flex-direction: column; gap: 6px; align-items: flex-start; }
  .sizeCap { font-family: var(--arvo-font-display); font-size: 8px; letter-spacing: 0.25em; text-transform: uppercase; color: rgba(200,184,154,0.40); }
  .rule { border-top: 1px solid rgba(200,184,154,0.10); margin: 6px 0 4px; }

  button { font: inherit; cursor: pointer; line-height: 1; }

  /* Base — 12px text, .12em tracking, no line-height stretching */
  .btn {
    font-family: var(--arvo-font-display);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    border: 1px solid transparent;
    border-radius: 3px;
    transition: background 280ms cubic-bezier(0.22,0.61,0.36,1), border-color 280ms, color 280ms;
    display: inline-flex; align-items: center; gap: 8px;
  }
  .btn-sm { font-size: 10px; padding: 7px 14px; }
  .btn-md { font-size: 11px; padding: 9px 18px; }
  .btn-lg { font-size: 12px; padding: 12px 22px; letter-spacing: 0.14em; }

  /* Variants */
  .v-gold {
    background: var(--arvo-gold); color: var(--arvo-black);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), inset 0 -1px 0 rgba(13,13,13,0.10);
  }
  .v-gold:hover { background: #D6C6A8; }

  .v-outline { background: transparent; color: var(--arvo-gold); border-color: var(--arvo-gold); }
  .v-outline:hover { background: rgba(200,184,154,0.10); }

  .v-ghost { background: transparent; color: rgba(242,237,228,0.85); border-color: rgba(242,237,228,0.20); }
  .v-ghost:hover { color: var(--arvo-offwhite); border-color: rgba(242,237,228,0.50); }

  .v-blue {
    background: var(--arvo-blue); color: white;
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.20), 0 4px 12px -6px rgba(27,79,216,0.45);
  }
  .v-blue:hover { background: #2858DE; }

  .arrow { font-size: 12px; letter-spacing: 0; }
</style></head>
<body class="dark">
<div class="card">

  <div class="lab">tamanhos</div>
  <div class="sizes">
    <div class="sizeGrp">
      <button class="btn btn-sm v-gold">Começar</button>
      <span class="sizeCap">sm · 28px · toolbars</span>
    </div>
    <div class="sizeGrp">
      <button class="btn btn-md v-gold">Começar</button>
      <span class="sizeCap">md · 34px · padrão</span>
    </div>
    <div class="sizeGrp">
      <button class="btn btn-lg v-gold">Começar <span class="arrow">→</span></button>
      <span class="sizeCap">lg · 42px · hero · landing</span>
    </div>
  </div>

  <div class="rule"></div>

  <div class="lab">variantes · md</div>
  <div class="row">
    <button class="btn btn-md v-gold">Começar <span class="arrow">→</span></button>
    <button class="btn btn-md v-outline">Manifesto</button>
    <button class="btn btn-md v-ghost">Entrar</button>
    <button class="btn btn-md v-blue">Aportar <span class="arrow">+</span></button>
  </div>

</div>
</body></html>
