<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Editorial accent — Playfair Italic</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-black); overflow: hidden; }
  .card { padding: 24px 32px; min-height: 100vh; justify-content: center; gap: 18px; }
  .q { font-family: var(--arvo-font-serif); font-style: italic; font-weight: 400; color: var(--arvo-gold); font-size: 44px; line-height: 1.15; letter-spacing: 0.01em; max-width: 480px; }
  .cite { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.30em; text-transform: uppercase; color: var(--arvo-fg-on-dark-soft); }
  .small { font-family: var(--arvo-font-serif); font-style: italic; font-size: 18px; color: var(--arvo-gold); opacity: 0.8; }
</style></head>
<body class="dark">
<div class="card">
  <div class="cite">Playfair Display · Italic · 400/500 · cor preferida gold</div>
  <div class="q">"o pequeno que vai se tornar grande."</div>
  <div class="small">— taglines, citações, subtítulos editoriais</div>
</div>
</body></html>
