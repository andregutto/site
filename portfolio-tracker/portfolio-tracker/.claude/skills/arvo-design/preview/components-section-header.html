<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Eyebrow + section header</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-black); overflow: hidden; }
  .card { padding: 28px 36px; min-height: 100vh; justify-content: center; gap: 18px; }
  .eb { font-family: var(--arvo-font-display); font-size: 10px; letter-spacing: 0.30em; text-transform: uppercase; color: var(--arvo-gold); opacity: 0.65; display: flex; align-items: center; gap: 18px; }
  .eb::after { content: ''; flex: 1; height: 1px; background: linear-gradient(to right, rgba(200,184,154,0.35), transparent); }
  .h2 { font-family: var(--arvo-font-display); font-size: 36px; letter-spacing: 0.10em; color: var(--arvo-offwhite); line-height: 1.15; }
  .sub { font-family: var(--arvo-font-serif); font-style: italic; font-size: 16px; color: var(--arvo-gold); opacity: 0.85; }
</style></head>
<body class="dark">
<div class="card">
  <div class="eb">Arquitetura de Verticais</div>
  <div class="h2">três verticais. uma raiz.</div>
  <div class="sub">a marca-mãe assina tudo em preto e dourado.</div>
</div>
</body></html>
