<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Motion</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .card { padding: 20px 28px; min-height: 100vh; justify-content: center; gap: 14px; }
  .row { display: grid; grid-template-columns: 90px 1fr 90px; align-items: center; gap: 16px; }
  .nm { font-family: var(--arvo-font-display); font-size: 11px; color: var(--arvo-fg); }
  .px { font-family: var(--arvo-font-display); font-size: 10px; letter-spacing: 0.08em; color: var(--arvo-fg-soft); text-align: right; }
  .track { position: relative; height: 6px; background: rgba(13,13,13,0.08); border-radius: 99px; }
  .dot { position: absolute; top: -4px; width: 14px; height: 14px; border-radius: 50%; background: var(--arvo-gold); }
  .d1 .dot { animation: m1 1.6s infinite alternate cubic-bezier(0.22, 0.61, 0.36, 1); }
  .d2 .dot { animation: m1 2.8s infinite alternate cubic-bezier(0.16, 1, 0.30, 1); }
  .d3 .dot { animation: m1 4.5s infinite alternate cubic-bezier(0.22, 0.61, 0.36, 1); }
  @keyframes m1 { from { left: 0; } to { left: calc(100% - 14px); } }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="nm">fast</div><div class="track d1"><div class="dot"></div></div><div class="px">160ms</div></div>
  <div class="row"><div class="nm">base</div><div class="track d2"><div class="dot"></div></div><div class="px">280ms ease</div></div>
  <div class="row"><div class="nm">slow</div><div class="track d3"><div class="dot"></div></div><div class="px">600ms ease-out</div></div>
  <div class="row" style="grid-template-columns: 1fr;"><div class="px" style="text-align: center; font-family: var(--arvo-font-serif); font-style: italic; color: var(--arvo-terracotta);">slow · intentional · never bouncy</div></div>
</div>
</body></html>
