<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Wordmark</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-black); overflow: hidden; }
  .card { padding: 24px; min-height: 100vh; justify-content: center; align-items: center; gap: 14px; }
  .wm { font-family: var(--arvo-font-display); font-size: 88px; letter-spacing: 0.30em; text-indent: 0.30em; line-height: 1; color: var(--arvo-offwhite); }
  .tag { font-family: var(--arvo-font-serif); font-style: italic; font-size: 16px; color: var(--arvo-gold); letter-spacing: 0.06em; }
  .rule { width: 60px; height: 1px; background: linear-gradient(to right, transparent, var(--arvo-gold), transparent); }
  .meta { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.30em; text-transform: uppercase; color: var(--arvo-fg-on-dark-soft); }
</style></head>
<body class="dark">
<div class="card">
  <div class="meta">wordmark · sempre minúsculo · 0.30em</div>
  <div class="wm">arvo</div>
  <div class="rule"></div>
  <div class="tag">cultive o que é seu</div>
</div>
</body></html>
