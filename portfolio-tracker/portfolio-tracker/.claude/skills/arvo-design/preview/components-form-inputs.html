<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Form inputs</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .card { padding: 22px 28px; min-height: 100vh; justify-content: center; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .lab { font-family: var(--arvo-font-display); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--arvo-fg-soft); }
  .input { font: inherit; font-family: var(--arvo-font-display); font-size: 14px; padding: 12px 14px; border: 1px solid var(--arvo-border); border-radius: 3px; background: white; color: var(--arvo-fg); outline: none; transition: border-color 280ms cubic-bezier(0.22,0.61,0.36,1); }
  .input:focus { border-color: var(--arvo-gold); box-shadow: 0 0 0 2px rgba(200,184,154,0.25); }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .seg { display: inline-flex; background: rgba(13,13,13,0.06); border-radius: 6px; padding: 3px; gap: 2px; width: fit-content; }
  .seg button { font-family: var(--arvo-font-display); font-size: 11px; letter-spacing: 0.10em; padding: 6px 14px; border: 0; background: transparent; color: var(--arvo-fg-soft); border-radius: 4px; cursor: pointer; }
  .seg button.on { background: white; color: var(--arvo-fg); box-shadow: 0 1px 2px rgba(13,13,13,0.06); }
</style></head>
<body>
<div class="card">
  <div class="row">
    <div class="field">
      <span class="lab">Nome</span>
      <input class="input" value="André" />
    </div>
    <div class="field">
      <span class="lab">Moeda</span>
      <div class="seg">
        <button class="on">BRL</button>
        <button>USD</button>
        <button>EUR</button>
      </div>
    </div>
  </div>
  <div class="field">
    <span class="lab">E-mail</span>
    <input class="input" placeholder="voce@arvo.cc" />
  </div>
</div>
</body></html>
