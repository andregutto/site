<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Base palette</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .grid { display: grid; grid-template-columns: 1.4fr 1fr 1fr 1fr 1fr; gap: 8px; padding: 14px; min-height: 100vh; align-items: stretch; }
  .sw { display: flex; flex-direction: column; gap: 6px; }
  .ch { border-radius: 8px; flex: 1; min-height: 110px; position: relative; }
  .ch::after { content: ''; position: absolute; inset: 0; border-radius: inherit; background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, transparent 50%); }
  .nm { font-family: var(--arvo-font-display); font-size: 12px; color: var(--arvo-fg); }
  .hx { font-family: var(--arvo-font-display); font-size: 10px; color: var(--arvo-fg-soft); letter-spacing: 0.05em; }
  .ro { font-family: var(--arvo-font-serif); font-style: italic; font-size: 10px; color: var(--arvo-fg-soft); }
</style></head>
<body>
<div class="grid">
  <div class="sw">
    <div class="ch" style="background:#0D0D0D; border:1px solid var(--arvo-border-dark);"></div>
    <div class="nm">Preto</div><div class="hx">#0D0D0D</div><div class="ro">landing · logo · impacto</div>
  </div>
  <div class="sw">
    <div class="ch" style="background:#C8B89A;"></div>
    <div class="nm">Dourado</div><div class="hx">#C8B89A</div><div class="ro">fio condutor</div>
  </div>
  <div class="sw">
    <div class="ch" style="background:#F2EDE4; border:1px solid var(--arvo-border);"></div>
    <div class="nm">Off-white</div><div class="hx">#F2EDE4</div><div class="ro">ferramentas</div>
  </div>
  <div class="sw">
    <div class="ch" style="background:#E8DFD0;"></div>
    <div class="nm">Bege</div><div class="hx">#E8DFD0</div><div class="ro">cards · separadores</div>
  </div>
  <div class="sw">
    <div class="ch" style="background:#A36A52;"></div>
    <div class="nm">Terracota</div><div class="hx">#A36A52</div><div class="ro">acento quente</div>
  </div>
</div>
</body></html>
