<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Tracking — Tenor Sans</title>
<link rel="stylesheet" href="_card.css">
<style>
  body { background: var(--arvo-offwhite); overflow: hidden; }
  .card { padding: 18px 28px; min-height: 100vh; justify-content: center; gap: 12px; }
  .row { display: grid; grid-template-columns: 1fr 90px; align-items: baseline; gap: 16px; }
  .ex { font-family: var(--arvo-font-display); font-size: 22px; color: var(--arvo-fg); }
  .meta { font-family: var(--arvo-font-display); font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--arvo-fg-soft); text-align: right; }
  .eb { font-family: var(--arvo-font-display); font-size: 11px; text-transform: uppercase; color: var(--arvo-gold); }
</style></head>
<body>
<div class="card">
  <div class="row"><div class="ex" style="letter-spacing: 0.04em;">body — close tracking</div><div class="meta">.04em</div></div>
  <div class="row"><div class="ex" style="letter-spacing: 0.10em;">headings — normal</div><div class="meta">.10em</div></div>
  <div class="row"><div class="ex" style="letter-spacing: 0.18em;">H1 — wide</div><div class="meta">.18em</div></div>
  <div class="row"><div class="eb" style="letter-spacing: 0.30em;">EYEBROW · WIDEST</div><div class="meta">.30em</div></div>
  <div class="row"><div class="ex" style="font-family: var(--arvo-font-display); font-size: 28px; letter-spacing: 0.30em; text-indent: 0.30em;">arvo</div><div class="meta">wordmark</div></div>
</div>
</body></html>
